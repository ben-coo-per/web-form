app = '{{FORM_NAME}}'
primary_region = 'iad'

[build]

[env]
  PORT = '3000'
  DB_PATH = '/data/data.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = '{{FORM_NAME}}_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
